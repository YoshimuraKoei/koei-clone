# Serverless Framework v3 — ライフログ蓄積（Slack / EventBridge / Lambda）
# Lambda: nodejs22.x（v3.40 の schema に未掲載のため configValidationMode: off。AWS 上のランタイムは問題なし）
service: koei-clone

frameworkVersion: '3'
# configValidationMode: off

# デプロイ時に .env を読み、${env:...} を解決する（Lambda の環境変数に載る）
useDotenv: true

plugins:
  - serverless-esbuild
  - serverless-offline

provider:
  name: aws
  runtime: nodejs22.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'ap-northeast-1'}
  memorySize: 256   # 単位は MB
  timeout: 30
  logRetentionInDays: 3   # ログの保持期間は 3 日間
  environment:
    SLACK_SIGNING_SECRET: ${env:SLACK_SIGNING_SECRET, ''}
    SLACK_BOT_TOKEN: ${env:SLACK_BOT_TOKEN, ''}
    GEMINI_API_KEY: ${env:GEMINI_API_KEY, ''}
    # 省略時はコード内デフォルト（gemini-2.5-flash-lite / gemini-embedding-2-preview）
    GEMINI_CHAT_MODEL: ${env:GEMINI_CHAT_MODEL, ''}
    GEMINI_EMBEDDING_MODEL: ${env:GEMINI_EMBEDDING_MODEL, ''}
    GEMINI_EMBEDDING_OUTPUT_DIMENSION: ${env:GEMINI_EMBEDDING_OUTPUT_DIMENSION, '1536'}
    SUPABASE_URL: ${env:SUPABASE_URL, ''}
    SUPABASE_SERVICE_ROLE_KEY: ${env:SUPABASE_SERVICE_ROLE_KEY, ''}
    SLACK_DAILY_CHANNEL_ID: ${env:SLACK_DAILY_CHANNEL_ID, ''}   # 定時投稿先（プライベートチャンネル等のチャンネル ID）
    SLACK_OPS_CHANNEL_ID: ${env:SLACK_OPS_CHANNEL_ID, ''}   # 運用アラート用（未設定なら通知スキップ）
    SLACK_ALLOWED_CHANNEL_IDS: ${env:SLACK_ALLOWED_CHANNEL_IDS, ''}   # 受信対象チャンネル ID（カンマ区切り。未設定は全チャンネル受信）

package:
  individually: true

functions:
  # Slack Events API（URL 検証・メッセージ受信 → Supabase へ保存の入口）
  receiver:
    handler: src/handlers/receiver.handler
    description: Slack Events API receiver (Bolt + AwsLambdaReceiver)
    events:
      - http:
          path: slack/events
          method: post
          cors: false

  # 決まった時刻に問いかけ（EventBridge スケジュール・JST 朝8時・夜22時）
  scheduler:
    handler: src/handlers/scheduler.handler
    description: Daily prompt via Slack (EventBridge cron)
    timeout: 60
    events:
      - schedule:
          # JST 08:00 (= UTC 前日 23:00)
          rate: cron(0 23 * * ? *)
          enabled: true
      - schedule:
          # JST 22:00 (= UTC 13:00)
          rate: cron(0 13 * * ? *)
          enabled: true

  # 要約・埋め込み生成バッチ（1 日 1 回・embedding が null の行を最大 10 件/回）
  processor:
    handler: src/handlers/processor.handler
    description: Summary + embedding backfill for daily_thought_logs
    timeout: 120
    memorySize: 512   # processor は処理が多いためメモリを増やす
    events:
      - schedule:
          # JST 03:00 頃（UTC 18:00）。変えたいときは cron を調整
          rate: cron(0 18 * * ? *)
          enabled: true

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node22
    platform: node
    concurrency: 10

# 第二段階: タイムアウト・OOM をログメトリクスで検知 → SNS → Gmail（OPS_ALERT_EMAIL）
resources:
  - ${file(serverless.cloudwatch.yml)}